name: Sync PR to Gitea

on:
  pull_request:
    types: [closed]

jobs:
  sync-to-gitea:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Clone Gitea repository
        run: |
          git clone https://${{ secrets.GITEA_OWNER }}:${{ secrets.GITEA_TOKEN }}@git.linux.toys/psygreg/linuxtoys.git gitea-repo
        env:
          GITEA_OWNER: ${{ secrets.GITEA_OWNER }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}

      - name: Add GitHub remote and fetch PR branch
        run: |
          cd gitea-repo
          git remote add github https://github.com/${{ github.repository }}.git
          git fetch github pull/${{ github.event.pull_request.number }}/head:pr-branch

      - name: Get commits from PR
        id: commits
        run: |
          cd gitea-repo
          # Get all commits from the PR branch that are not in main
          COMMITS=$(git rev-list main..pr-branch)
          echo "commit_count=$(echo "$COMMITS" | wc -l)" >> $GITHUB_OUTPUT
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Cherry-pick PR commits
        run: |
          cd gitea-repo
          
          COMMITS='${{ steps.commits.outputs.commits }}'
          if [ -z "$COMMITS" ]; then
            echo "No commits to cherry-pick"
            exit 0
          fi
          
          echo "Attempting to cherry-pick ${{ steps.commits.outputs.commit_count }} commit(s)"
          
          # Cherry-pick commits in reverse order (oldest first)
          echo "$COMMITS" | tac | while IFS= read -r commit; do
            if [ -n "$commit" ]; then
              echo "Cherry-picking commit: $commit"
              git cherry-pick "$commit" --allow-empty || {
                echo "Cherry-pick failed for $commit"
                git cherry-pick --abort
                exit 1
              }
            fi
          done

      - name: Push to Gitea
        run: |
          cd gitea-repo
          
          # Check if we have commits ahead of origin/main
          COMMITS_AHEAD=$(git rev-list origin/main..HEAD | wc -l)
          if [ "$COMMITS_AHEAD" -eq 0 ]; then
            echo "No new commits to push"
            exit 0
          fi
          
          echo "Pushing $COMMITS_AHEAD commit(s) to Gitea"
          git push origin main
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
