name: Build Nuitka One-File Binary

on:
  # Trigger on manual dispatch
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (leave empty to auto-detect from source)"
        required: false
        default: ""

  # Trigger on push to main branch
  push:
    branches:
      - master
    paths:
      - "p3/app/updater/__init__.py"

jobs:
  build-nuitka-onefile:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y build-essential patchelf cmake python3 python3-dev python3-pip python3-venv git node.js libglib2.0-0 libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgirepository-2.0-dev -qq

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            # Use manual input if provided
            VERSION="${{ github.event.inputs.version }}"
            echo "[INFO] Using manual version: $VERSION"
          else
            # Extract from p3/app/updater/__init__.py __version__ variable
            VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' p3/app/updater/__init__.py)
            if [ -z "$VERSION" ]; then
              echo "[ERROR] Could not extract version from p3/app/updater/__init__.py"
              exit 1
            fi
            echo "[INFO] Using version from source: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build Nuitka one-file binary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT_PATH="/tmp/nuitka-build"

          # Run the Nuitka build script
          bash dev/build/nuitka/build.sh "$VERSION" "$OUTPUT_PATH"
        env:
          HOME: /root

      - name: Verify build artifacts
        run: |
          echo "=== Nuitka build artifacts ==="
          ls -lah /tmp/nuitka-build/ || echo "Nuitka build directory not found"
          find /tmp/nuitka-build/ -type f -executable 2>/dev/null || echo "No executable artifacts found"

      - name: Copy binary to dev/build/nuitka
        run: |
          if [ -f "/tmp/nuitka-build/linuxtoys.bin" ]; then
            cp /tmp/nuitka-build/linuxtoys.bin dev/build/nuitka/linuxtoys.bin
            echo "[INFO] Binary copied to dev/build/nuitka/linuxtoys.bin"
            ls -lah dev/build/nuitka/linuxtoys.bin
          else
            echo "[ERROR] linuxtoys.bin not found in /tmp/nuitka-build/"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config --local user.email "action@gitea.local"
          git config --local user.name "Gitea Action"

      - name: Commit and push binary
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Check if there are changes
          if git diff --quiet dev/build/nuitka/linuxtoys.bin; then
            echo "[INFO] No changes to binary, skipping commit"
          else
            git add dev/build/nuitka/linuxtoys.bin
            git commit -m "build: update linuxtoys.bin to version $VERSION"
            git push origin master
            echo "[INFO] Binary pushed to master branch"
          fi
