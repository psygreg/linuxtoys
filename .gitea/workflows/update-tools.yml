name: Update Tools Categories

on:
  # Trigger on manual dispatch
  workflow_dispatch:

  # Trigger on releases from LinuxToys repository
  repository_dispatch:
    types: [update-tools]

  # Schedule to run weekly
  schedule:
    - cron: "0 3 * * 0" # Run weekly at 03:00 on Sunday

jobs:
  update-tools:
    runs-on: docker
    container:
      image: catthehacker/ubuntu:act-latest
      options: --network host
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOKEN }}
          fetch-depth: 1
          server_url: http://localhost:3000

      - name: Checkout page branch
        uses: actions/checkout@v4
        with:
          ref: page
          path: page
          token: ${{ secrets.GITOKEN }}
          fetch-depth: 1
          server_url: http://localhost:3000

      - name: Clone LinuxToys repository
        run: |
          git clone --depth=1 --branch page http://localhost:3000/psygreg/linuxtoys /tmp/linuxtoys

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install axios

      - name: Fetch and process LinuxToys data
        run: |
          node .gitea/scripts/update-tools.js ./page/cache /tmp/linuxtoys
        env:
          GITHUB_TOKEN: ${{ secrets.GITOKEN }}

      - name: Clean up LinuxToys clone
        if: always()
        run: rm -rf /tmp/linuxtoys

      - name: Commit and push changes to page branch
        run: |
          cd page
          git config --local user.email "psygreg@pm.me"
          git config --local user.name "psygreg"
          git remote set-url origin http://psygreg:${{ secrets.GITOKEN }}@localhost:3000/psygreg/linuxtoys

          if [ -n "$(git status --porcelain)" ]; then
            git add cache/
            git commit -m "Update tools categories from master branch"
            git push origin page
          else
            echo "No changes to commit"
          fi
