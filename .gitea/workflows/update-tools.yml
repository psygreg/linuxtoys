name: Update Tools Categories

on:
  workflow_dispatch:
  repository_dispatch:
    types: [update-tools]
  schedule:
    - cron: "0 3 * * 0"

jobs:
  update-tools:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout page branch
        run: |
          git clone --depth=1 --branch page https://git.linux.toys/psygreg/linuxtoys /tmp/linuxtoys

      - name: Install dependencies
        run: |
          cd /tmp/linuxtoys && npm install

      - name: Fetch and process LinuxToys data
        run: |
          cd /tmp/linuxtoys && node .gitea/scripts/update-tools.js ./cache .

      - name: Push changes to Gitea page branch
        run: |
          cd /tmp/linuxtoys
          git config --local user.email "psygreg@pm.me"
          git config --local user.name "psygreg"
          git remote set-url origin https://psygreg:${{ secrets.GITOKEN }}@git.linux.toys/psygreg/linuxtoys

          if [ -n "$(git status --porcelain)" ]; then
            git add cache/
            git commit -m "Update tools categories from Gitea repository"
            git push origin page
          else
            echo "No changes to commit"
          fi
      - name: Cleanup
        run: rm -rf /tmp/linuxtoys
