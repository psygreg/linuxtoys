name: Update Tools Categories

on:
  # Trigger on manual dispatch
  workflow_dispatch:

  # Trigger on releases from LinuxToys repository
  repository_dispatch:
    types: [update-tools]

  # Schedule to run weekly
  schedule:
    - cron: "0 3 * * 6" # Run weekly at 03:00 on Saturday

jobs:
  update-tools:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Dependencies
        run: |
          apt-get update -qq
          apt-get install -y nodejs npm -qq

      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout page branch
        uses: actions/checkout@v4
        with:
          ref: page
          path: page
          fetch-depth: 0

      - name: Clone LinuxToys repository
        run: |
          git clone --depth=1 https://git.linux.toys/psygreg/linuxtoys /tmp/linuxtoys

      - name: Install dependencies
        run: |
          npm install axios

      - name: Fetch and process LinuxToys data
        run: |
          node .gitea/scripts/update-tools.js ./pages/cache /tmp/linuxtoys
        env:
          GITEA_TOKEN: ${{ secrets.GITOKEN }}

      - name: Clean up LinuxToys clone
        if: always()
        run: |
          rm -rf /tmp/linuxtoys

      - name: Commit and push changes to pages branch
        run: |
          cd page
          git config --local user.email "psygreg@pm.me"
          git config --local user.name "psygreg"

          if [ -n "$(git status --porcelain)" ]; then
            git add cache/
            git commit -m "Update tools categories from master branch"
            git push origin page
          else
            echo "No changes to commit"
          fi
