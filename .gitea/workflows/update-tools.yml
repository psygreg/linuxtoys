name: Update Tools Categories

on:
  # Trigger on manual dispatch
  workflow_dispatch:

  # Trigger on releases from LinuxToys repository
  repository_dispatch:
    types: [update-tools]

  # Schedule to run weekly
  schedule:
    - cron: "0 3 * * 0" # Run weekly at 03:00 on Sunday

jobs:
  update-tools:
    runs-on: docker
    container: node:18
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout page branch
        run: |
          git clone --depth=1 --branch page https://psygreg:${{ secrets.GITOKEN }}@git.linux.toys/psygreg/linuxtoys .

      - name: Setup Node.js
        run: |
          npm install --global npm@latest

      - name: Install dependencies
        run: |
          npm install axios

      - name: Fetch and process LinuxToys data
        run: |
          node .gitea/scripts/update-tools.js ./cache .
        env:
          GITHUB_TOKEN: ${{ secrets.GHTOKEN }}

      - name: Push changes to Gitea page branch
        run: |
          git config --local user.email "psygreg@pm.me"
          git config --local user.name "psygreg"
          git remote set-url origin https://psygreg:${{ secrets.GITOKEN }}@git.linux.toys/psygreg/linuxtoys

          if [ -n "$(git status --porcelain)" ]; then
            git add cache/
            git commit -m "Update tools categories from Gitea repository"
            git push origin page
          else
            echo "No changes to commit"
          fi
