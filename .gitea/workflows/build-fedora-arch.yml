name: Build Fedora & Arch Packages

on:
  # Trigger on manual dispatch
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (leave empty to auto-detect from source)"
        required: false
        default: ""

  # Trigger on push to main branch
  push:
    branches:
      - main
    paths:
      - "p3/app/updater/__init__.py"

jobs:
  build-fedora-arch:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - name: Install Node.js and git (required for actions/checkout)
        run: |
          dnf update -y
          dnf install -y nodejs git

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          dnf install -y @development-tools python3-devel rpm-build binutils fakeroot desktop-file-utils

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            # Use manual input if provided
            VERSION="${{ github.event.inputs.version }}"
            echo "[INFO] Using manual version: $VERSION"
          else
            # Extract from p3/app/updater/__init__.py __version__ variable
            VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' p3/app/updater/__init__.py)
            if [ -z "$VERSION" ]; then
              echo "[ERROR] Could not extract version from p3/app/updater/__init__.py"
              exit 1
            fi
            echo "[INFO] Using version from source: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build Fedora/RPM package (COPR)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT_PATH="/tmp/fedora-build"

          # Run the COPR build script
          bash dev/build/copr/build.sh "$VERSION" "$OUTPUT_PATH"
        env:
          HOME: /root

      - name: Build Arch Linux package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT_PATH="/tmp/arch-build"

          # Run the Arch build script
          bash dev/build/pkg/build.sh "$VERSION" "$OUTPUT_PATH"
        env:
          HOME: /root

      - name: Verify build artifacts
        run: |
          echo "=== Fedora/RPM build artifacts ==="
          ls -lah /tmp/fedora-build/ || echo "Fedora build directory not found"
          find /tmp/fedora-build/ -type f \( -name "*.rpm" -o -name "*.srpm" \) 2>/dev/null || echo "No RPM artifacts found"

          echo ""
          echo "=== Arch build artifacts ==="
          ls -lah /tmp/arch-build/ || echo "Arch build directory not found"
          find /tmp/arch-build/ -type f \( -name "*.tar.xz" -o -name "PKGBUILD" -o -name "*.pkg.tar.zst" \) 2>/dev/null || echo "No Arch artifacts found"

      - name: Prepare artifacts for Gitea
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT_PATH="artifacts-$VERSION"

          # Create artifact directory
          mkdir -p "$ARTIFACT_PATH"

          # Copy RPM and SRPM packages from Fedora build
          if [ -d "/tmp/fedora-build" ]; then
            find /tmp/fedora-build -type f \( -name "*.rpm" -o -name "*.srpm" \) -exec cp {} "$ARTIFACT_PATH/" \;
          fi

          # Copy Arch Linux artifacts
          if [ -d "/tmp/arch-build" ]; then
            cp /tmp/arch-build/PKGBUILD "$ARTIFACT_PATH/" 2>/dev/null || true
            cp /tmp/arch-build/linuxtoys-*.tar.xz "$ARTIFACT_PATH/" 2>/dev/null || true
            cp /tmp/arch-build/*.pkg.tar.zst "$ARTIFACT_PATH/" 2>/dev/null || true
          fi

          # List artifacts
          echo "[INFO] Artifacts to be uploaded:"
          ls -lah "$ARTIFACT_PATH/" || echo "No artifacts found"

      - name: Upload artifacts to Gitea
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: fedora-arch-packages-${{ steps.version.outputs.version }}
          path: artifacts-${{ steps.version.outputs.version }}/
          retention-days: 7
          if-no-files-found: warn
