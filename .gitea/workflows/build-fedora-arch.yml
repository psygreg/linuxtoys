name: Build Fedora & Arch Packages

on:
  # Trigger on successful completion of build-nuitka-onefile workflow
  #workflow_run:
  #workflows:
  #- "Build Nuitka One-File Binary"
  #types:
  #- completed
  #branches:
  #- master

  # Trigger on manual dispatch
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (leave empty to auto-detect from source)"
        required: false
        default: ""

jobs:
  build-fedora-arch:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - name: Install Node.js and git (required for actions/checkout)
        run: |
          dnf update -y
          dnf install -y nodejs git

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Nuitka artifacts
        if: github.event_name == 'workflow_run'
        run: |
          # Get the latest successful run of build-nuitka-onefile workflow
          WORKFLOW_RUN_ID="${{ github.event.workflow_run.id }}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"

          echo "[INFO] Downloading artifacts from workflow run: $WORKFLOW_RUN_ID"

          # Create directory for artifacts
          mkdir -p ./nuitka-artifacts

          # Query Gitea API for artifacts from this workflow run
          ARTIFACTS=$(curl -s -H "Authorization: token ${{ secrets.GITOKEN }}" \
            "https://git.linux.toys/api/v1/repos/$REPO_OWNER/$REPO_NAME/actions/runs/$WORKFLOW_RUN_ID/artifacts" | \
            jq -r '.artifacts[] | .id')

          if [ -z "$ARTIFACTS" ]; then
            echo "[WARNING] No artifacts found for workflow run $WORKFLOW_RUN_ID"
            exit 0
          fi

          # Download each artifact
          for ARTIFACT_ID in $ARTIFACTS; do
            echo "[INFO] Downloading artifact: $ARTIFACT_ID"
            curl -s -H "Authorization: token ${{ secrets.GITOKEN }}" \
              -o "./nuitka-artifacts/artifact-$ARTIFACT_ID.zip" \
              "https://git.linux.toys/api/v1/repos/$REPO_OWNER/$REPO_NAME/actions/artifacts/$ARTIFACT_ID/download"

            # Extract the artifact
            if [ -f "./nuitka-artifacts/artifact-$ARTIFACT_ID.zip" ]; then
              unzip -q "./nuitka-artifacts/artifact-$ARTIFACT_ID.zip" -d "./nuitka-artifacts/"
              rm "./nuitka-artifacts/artifact-$ARTIFACT_ID.zip"
            fi
          done

          echo "[INFO] Artifacts downloaded and extracted"
          ls -lah ./nuitka-artifacts/ || echo "No artifacts found"

      - name: Install build dependencies
        run: |
          dnf install -y @development-tools python3-devel rpm-build binutils fakeroot desktop-file-utils

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            # Use manual input if provided
            VERSION="${{ github.event.inputs.version }}"
            echo "[INFO] Using manual version: $VERSION"
          else
            # Extract from p3/app/updater/__init__.py __version__ variable
            VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' p3/app/updater/__init__.py)
            if [ -z "$VERSION" ]; then
              echo "[ERROR] Could not extract version from p3/app/updater/__init__.py"
              exit 1
            fi
            echo "[INFO] Using version from source: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build Fedora/RPM package (COPR)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT_PATH="/tmp/fedora-build"

          # Run the COPR build script
          bash dev/build/copr/build.sh "$VERSION" "$OUTPUT_PATH"
        env:
          HOME: /root

      - name: Build Arch Linux package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT_PATH="/tmp/arch-build"

          # Run the Arch build script
          bash dev/build/pkg/build.sh "$VERSION" "$OUTPUT_PATH"
        env:
          HOME: /root

      - name: Verify build artifacts
        run: |
          echo "=== Fedora/RPM build artifacts ==="
          ls -lah /tmp/fedora-build/ || echo "Fedora build directory not found"
          find /tmp/fedora-build/ -type f \( -name "*.rpm" -o -name "*.srpm" \) 2>/dev/null || echo "No RPM artifacts found"

          echo ""
          echo "=== Arch build artifacts ==="
          ls -lah /tmp/arch-build/ || echo "Arch build directory not found"
          find /tmp/arch-build/ -type f \( -name "*.tar.xz" -o -name "PKGBUILD" -o -name "*.pkg.tar.zst" \) 2>/dev/null || echo "No Arch artifacts found"

      - name: Prepare artifacts for Gitea
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT_PATH="artifacts-$VERSION"

          # Create artifact directory
          mkdir -p "$ARTIFACT_PATH"

          # Copy RPM and SRPM packages from Fedora build
          if [ -d "/tmp/fedora-build" ]; then
            find /tmp/fedora-build -type f \( -name "*.rpm" -o -name "*.srpm" \) -exec cp {} "$ARTIFACT_PATH/" \;
          fi

          # Copy Arch Linux artifacts
          if [ -d "/tmp/arch-build" ]; then
            cp /tmp/arch-build/PKGBUILD "$ARTIFACT_PATH/" 2>/dev/null || true
            cp /tmp/arch-build/linuxtoys-*.tar.xz "$ARTIFACT_PATH/" 2>/dev/null || true
            cp /tmp/arch-build/*.pkg.tar.zst "$ARTIFACT_PATH/" 2>/dev/null || true
          fi

          # Also copy Nuitka artifacts if they were downloaded
          if [ -d "./nuitka-artifacts" ]; then
            find ./nuitka-artifacts -type f -exec cp {} "$ARTIFACT_PATH/" \; 2>/dev/null || true
          fi

          # List artifacts
          echo "[INFO] Artifacts to be uploaded:"
          ls -lah "$ARTIFACT_PATH/" || echo "No artifacts found"

      - name: Upload artifacts to Gitea
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: fedora-arch-packages-${{ steps.version.outputs.version }}
          path: artifacts-${{ steps.version.outputs.version }}/
          retention-days: 7
          if-no-files-found: warn
