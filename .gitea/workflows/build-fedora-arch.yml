name: Build Fedora & Arch Packages

on:
  # Trigger on manual dispatch
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (leave empty to auto-detect from source)"
        required: false
        default: ""

  # Trigger on push to main branch
  push:
    branches:
      - main
    paths:
      - "p3/**"
      - "src/**"
      - "dev/build/copr/**"
      - "dev/build/pkg/**"
      - ".gitea/workflows/build-fedora-arch.yml"

jobs:
  build-packages:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          dnf install -y rpm-build rpmbuild gcc python3 python3-devel tar xz gzip git desktop-file-utils

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            # Use manual input if provided
            VERSION="${{ github.event.inputs.version }}"
            echo "[INFO] Using manual version: $VERSION"
          else
            # Extract from p3/app/updater/__init__.py __version__ variable
            VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' p3/app/updater/__init__.py)
            if [ -z "$VERSION" ]; then
              echo "[ERROR] Could not extract version from p3/app/updater/__init__.py"
              exit 1
            fi
            echo "[INFO] Using version from source: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build RPM package (COPR)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT_PATH="/tmp/copr-build"

          # Run the COPR build script
          bash dev/build/copr/build.sh "$VERSION" "$OUTPUT_PATH"
        env:
          HOME: /root

      - name: Build Arch package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT_PATH="/tmp/pkg-build"

          # Install makepkg dependencies
          dnf install -y binutils fakeroot base-devel

          # Run the Arch build script
          bash dev/build/pkg/build.sh "$VERSION" "$OUTPUT_PATH"
        env:
          HOME: /root

      - name: Verify build artifacts
        run: |
          echo "=== COPR Build Artifacts ==="
          ls -lah /tmp/copr-build/ || echo "COPR build directory not found"

          echo ""
          echo "=== Arch Build Artifacts ==="
          ls -lah /tmp/pkg-build/ || echo "Arch build directory not found"

      - name: Prepare artifacts for upload
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT_PATH="artifacts-$VERSION"

          # Create artifact directory
          mkdir -p "$ARTIFACT_PATH"

          # Copy RPM and SRPM packages from COPR build
          if [ -d "/tmp/copr-build" ]; then
            cp /tmp/copr-build/RPMS/*/*.rpm "$ARTIFACT_PATH/" 2>/dev/null || true
            cp /tmp/copr-build/SRPMS/*.rpm "$ARTIFACT_PATH/" 2>/dev/null || true
          fi

          # Copy Arch Linux artifacts
          if [ -d "/tmp/pkg-build" ]; then
            cp /tmp/pkg-build/PKGBUILD "$ARTIFACT_PATH/" 2>/dev/null || true
            cp /tmp/pkg-build/linuxtoys-${VERSION}.tar.xz "$ARTIFACT_PATH/" 2>/dev/null || true
            cp /tmp/pkg-build/*.pkg.tar.zst "$ARTIFACT_PATH/" 2>/dev/null || true
          fi

          # List artifacts
          echo "[INFO] Artifacts to be uploaded:"
          ls -lah "$ARTIFACT_PATH/" || echo "No artifacts found"

      - name: Upload artifacts to Gitea
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: fedora-arch-packages-${{ steps.version.outputs.version }}
          path: artifacts-${{ steps.version.outputs.version }}/
          retention-days: 7
          if-no-files-found: warn
