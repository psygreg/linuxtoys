name: Build DEB Package & Upload to Launchpad PPA

on:
  # Trigger on manual dispatch
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (leave empty to auto-detect from source)"
        required: false
        default: ""
      upload_to_ppa:
        description: "Upload to Launchpad PPA"
        required: false
        type: boolean
        default: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Nuitka artifacts
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"

          echo "[INFO] Fetching latest nuitka workflow run"

          # Create directory for artifacts
          mkdir -p ./nuitka-artifacts

          # Query Gitea API for workflow runs of build-nuitka-onefile
          RUNS_RESPONSE=$(curl -s -w "\n%{http_code}" -H "Authorization: token ${{ secrets.GITOKEN }}" \
            "https://git.linux.toys/api/v1/repos/$REPO_OWNER/$REPO_NAME/actions/runs?workflow=build-nuitka-onefile.yml&status=success&limit=1")

          HTTP_CODE=$(echo "$RUNS_RESPONSE" | tail -n1)
          RUNS_BODY=$(echo "$RUNS_RESPONSE" | sed '$d')

          echo "[DEBUG] API HTTP Code: $HTTP_CODE"
          echo "[DEBUG] API Response: $RUNS_BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "[WARNING] API returned HTTP $HTTP_CODE. Skipping artifact download."
            exit 0
          fi

          # Get the latest successful workflow run ID
          WORKFLOW_RUN_ID=$(echo "$RUNS_BODY" | jq -r '.workflow_runs[0]?.id' 2>/dev/null)

          if [ -z "$WORKFLOW_RUN_ID" ]; then
            echo "[WARNING] No successful nuitka workflow runs found"
            exit 0
          fi

          echo "[INFO] Found latest workflow run: $WORKFLOW_RUN_ID"

          # Now query artifacts from this specific workflow run
          ARTIFACTS_RESPONSE=$(curl -s -w "\n%{http_code}" -H "Authorization: token ${{ secrets.GITOKEN }}" \
            "https://git.linux.toys/api/v1/repos/$REPO_OWNER/$REPO_NAME/actions/runs/$WORKFLOW_RUN_ID/artifacts")

          ARTIFACTS_HTTP_CODE=$(echo "$ARTIFACTS_RESPONSE" | tail -n1)
          ARTIFACTS_BODY=$(echo "$ARTIFACTS_RESPONSE" | sed '$d')

          echo "[DEBUG] Artifacts API HTTP Code: $ARTIFACTS_HTTP_CODE"
          echo "[DEBUG] Artifacts API Response: $ARTIFACTS_BODY"

          if [ "$ARTIFACTS_HTTP_CODE" != "200" ]; then
            echo "[WARNING] Artifacts API returned HTTP $ARTIFACTS_HTTP_CODE. Skipping artifact download."
            exit 0
          fi

          # Get the latest artifact ID from this run
          LATEST_ARTIFACT=$(echo "$ARTIFACTS_BODY" | jq -r '.artifacts[0]?.id' 2>/dev/null)

          if [ -z "$LATEST_ARTIFACT" ]; then
            echo "[WARNING] No artifacts found in workflow run $WORKFLOW_RUN_ID"
            exit 0
          fi

          echo "[INFO] Downloading artifact: $LATEST_ARTIFACT"
          curl -s -H "Authorization: token ${{ secrets.GITOKEN }}" \
            -o "./nuitka-artifacts/artifact-latest.zip" \
            "https://git.linux.toys/api/v1/repos/$REPO_OWNER/$REPO_NAME/actions/artifacts/$LATEST_ARTIFACT/download"

          # Extract the artifact
          if [ -f "./nuitka-artifacts/artifact-latest.zip" ]; then
            unzip -q "./nuitka-artifacts/artifact-latest.zip" -d "./nuitka-artifacts/"
            rm "./nuitka-artifacts/artifact-latest.zip"
          fi

          echo "[INFO] Artifacts downloaded and extracted"
          ls -lah ./nuitka-artifacts/ || echo "No artifacts found"

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq debhelper devscripts dput

      - name: Determine version and upload decision
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            # Use manual input if provided
            VERSION="${{ github.event.inputs.version }}"
            echo "[INFO] Using manual version: $VERSION"
          else
            # Extract from p3/app/updater/__init__.py __version__ variable
            VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' p3/app/updater/__init__.py)
            if [ -z "$VERSION" ]; then
              echo "[ERROR] Could not extract version from p3/app/updater/__init__.py"
              exit 1
            fi
            echo "[INFO] Using version from source: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Determine if we should upload to PPA
          if [ -n "${{ github.event.inputs.upload_to_ppa }}" ]; then
            # Use manual input if provided (workflow_dispatch)
            UPLOAD_TO_PPA="${{ github.event.inputs.upload_to_ppa }}"
          else
            # For automatic triggers (push or workflow_run), default to true
            UPLOAD_TO_PPA="true"
          fi
          echo "upload_to_ppa=$UPLOAD_TO_PPA" >> $GITHUB_OUTPUT
          echo "[INFO] Upload to PPA: $UPLOAD_TO_PPA"
          echo "Building version: $VERSION"

      - name: Setup GPG key
        if: ${{ steps.version.outputs.upload_to_ppa == 'true' }}
        run: |
          # Create GPG directory with proper permissions
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg

          # Import the private key
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import --no-tty

          # List imported keys to verify
          gpg --list-secret-keys

          # Set trust level for the key
          gpg --batch --import-ownertrust <<< "$(gpg --batch --list-secret-keys --with-colons vicgregor@pm.me | grep fpr | cut -d: -f10):6:"

      - name: Configure Git
        run: |
          git config --local user.email "vicgregor@pm.me"
          git config --local user.name "Victor Gregory"

      - name: Build DEB package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT_PATH="/tmp/deb-build"

          # Run the existing build script
          bash dev/build/deb/build.sh "$VERSION" "$OUTPUT_PATH"
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Verify build artifacts
        run: |
          OUTPUT_PATH="/tmp/deb-build"
          echo "Contents of build directory:"
          ls -lah "$OUTPUT_PATH/" || echo "Build directory not found"

      - name: Setup dput for PPA
        if: ${{ steps.version.outputs.upload_to_ppa == 'true' }}
        run: |
          mkdir -p ~/.dput.d
          cat > ~/.dput.d/ppa << 'DPUT_CONFIG'
          [ppa:psygreg/linuxtoys]
          fqdn = ppa.launchpad.net
          method = sftp
          incoming = ~${{ secrets.LAUNCHPAD_LOGIN }}/linuxtoys/ubuntu
          login = ${{ secrets.LAUNCHPAD_LOGIN }}
          DPUT_CONFIG

      - name: Upload to Launchpad PPA
        if: ${{ steps.version.outputs.upload_to_ppa == 'true' }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT_PATH="/tmp/deb-build"

          # Allow time for file operations to complete
          sleep 2

          # Upload source package to PPA
          if [ -f "$OUTPUT_PATH/linuxtoys_${VERSION}-1_source.changes" ]; then
            echo "[INFO] Uploading source package to Launchpad PPA..."
            cd "$OUTPUT_PATH"
            dput ppa:${{ secrets.LAUNCHPAD_LOGIN }}/linuxtoys "linuxtoys_${VERSION}-1_source.changes"
            echo "[INFO] Upload completed successfully"
          else
            echo "[ERROR] Source changes file not found"
            echo "Available files:"
            ls -lah "$OUTPUT_PATH/" || true
            exit 1
          fi
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          HOME: /root

      - name: Prepare artifacts for Gitea
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT_PATH="/tmp/deb-build"
          ARTIFACT_PATH="artifacts-${{ steps.version.outputs.version }}"

          # Create artifact directory
          mkdir -p "$ARTIFACT_PATH"

          # Copy all build artifacts
          if [ -d "$OUTPUT_PATH" ]; then
            cp "$OUTPUT_PATH"/*.deb "$ARTIFACT_PATH/" 2>/dev/null || true
            cp "$OUTPUT_PATH"/*.changes "$ARTIFACT_PATH/" 2>/dev/null || true
            cp "$OUTPUT_PATH"/*.dsc "$ARTIFACT_PATH/" 2>/dev/null || true
            cp "$OUTPUT_PATH"/*.tar.xz "$ARTIFACT_PATH/" 2>/dev/null || true
          fi

          # Also copy Nuitka artifacts if they were downloaded
          if [ -d "./nuitka-artifacts" ]; then
            find ./nuitka-artifacts -type f -exec cp {} "$ARTIFACT_PATH/" \; 2>/dev/null || true
          fi

          # List artifacts
          echo "[INFO] Artifacts to be uploaded:"
          ls -lah "$ARTIFACT_PATH/" || echo "No artifacts found"

      - name: Upload artifacts to Gitea
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: deb-packages-${{ steps.version.outputs.version }}
          path: artifacts-${{ steps.version.outputs.version }}/
          retention-days: 7
          if-no-files-found: warn
