name: Build DEB Package & Upload to Launchpad PPA

on:
  # Trigger on manual dispatch
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (leave empty to auto-detect from source)"
        required: false
        default: ""
      upload_to_ppa:
        description: "Upload to Launchpad PPA"
        required: false
        type: boolean
        default: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq debhelper devscripts dput

      - name: Determine version and upload decision
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            # Use manual input if provided
            VERSION="${{ github.event.inputs.version }}"
            echo "[INFO] Using manual version: $VERSION"
          else
            # Extract from p3/app/updater/__init__.py __version__ variable
            VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' p3/app/updater/__init__.py)
            if [ -z "$VERSION" ]; then
              echo "[ERROR] Could not extract version from p3/app/updater/__init__.py"
              exit 1
            fi
            echo "[INFO] Using version from source: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Determine if we should upload to PPA
          if [ -n "${{ github.event.inputs.upload_to_ppa }}" ]; then
            # Use manual input if provided (workflow_dispatch)
            UPLOAD_TO_PPA="${{ github.event.inputs.upload_to_ppa }}"
          else
            # For automatic triggers (push or workflow_run), default to true
            UPLOAD_TO_PPA="true"
          fi
          echo "upload_to_ppa=$UPLOAD_TO_PPA" >> $GITHUB_OUTPUT
          echo "[INFO] Upload to PPA: $UPLOAD_TO_PPA"
          echo "Building version: $VERSION"

      - name: Verify Nuitka binary exists
        run: |
          if [ ! -f "dev/build/nuitka/linuxtoys.bin" ]; then
            echo "[ERROR] linuxtoys.bin not found at dev/build/nuitka/linuxtoys.bin"
            echo "[INFO] Please run the build-nuitka-onefile workflow first to build the binary."
            exit 1
          fi
          echo "[INFO] Found linuxtoys.bin at dev/build/nuitka/linuxtoys.bin"
          ls -lah dev/build/nuitka/linuxtoys.bin

      - name: Setup GPG key
        if: ${{ steps.version.outputs.upload_to_ppa == 'true' }}
        run: |
          # Create GPG directory with proper permissions
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg

          # Import the private key
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import --no-tty

          # List imported keys to verify
          gpg --list-secret-keys

          # Set trust level for the key
          gpg --batch --import-ownertrust <<< "$(gpg --batch --list-secret-keys --with-colons vicgregor@pm.me | grep fpr | cut -d: -f10):6:"

      - name: Configure Git
        run: |
          git config --local user.email "vicgregor@pm.me"
          git config --local user.name "Victor Gregory"

      - name: Build DEB package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT_PATH="/tmp/deb-build"
          NUITKA_BINARY="$PWD/dev/build/nuitka/linuxtoys.bin"

          # Run the build script with the path to the Nuitka binary
          bash dev/build/deb/build.sh "$VERSION" "$OUTPUT_PATH" "$NUITKA_BINARY"
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Verify build artifacts
        run: |
          OUTPUT_PATH="/tmp/deb-build"
          echo "Contents of build directory:"
          ls -lah "$OUTPUT_PATH/" || echo "Build directory not found"

      - name: Setup dput for PPA
        if: ${{ steps.version.outputs.upload_to_ppa == 'true' }}
        run: |
          mkdir -p ~/.dput.d
          cat > ~/.dput.d/ppa << 'DPUT_CONFIG'
          [ppa:psygreg/linuxtoys]
          fqdn = ppa.launchpad.net
          method = sftp
          incoming = ~${{ secrets.LAUNCHPAD_LOGIN }}/linuxtoys/ubuntu
          login = ${{ secrets.LAUNCHPAD_LOGIN }}
          DPUT_CONFIG

      - name: Upload to Launchpad PPA
        if: ${{ steps.version.outputs.upload_to_ppa == 'true' }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT_PATH="/tmp/deb-build"

          # Allow time for file operations to complete
          sleep 2

          # Upload source package to PPA
          if [ -f "$OUTPUT_PATH/linuxtoys_${VERSION}-1_source.changes" ]; then
            echo "[INFO] Uploading source package to Launchpad PPA..."
            cd "$OUTPUT_PATH"
            dput ppa:${{ secrets.LAUNCHPAD_LOGIN }}/linuxtoys "linuxtoys_${VERSION}-1_source.changes"
            echo "[INFO] Upload completed successfully"
          else
            echo "[ERROR] Source changes file not found"
            echo "Available files:"
            ls -lah "$OUTPUT_PATH/" || true
            exit 1
          fi
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          HOME: /root

      - name: Prepare artifacts for Gitea
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT_PATH="/tmp/deb-build"
          ARTIFACT_PATH="artifacts-${{ steps.version.outputs.version }}"

          # Create artifact directory
          mkdir -p "$ARTIFACT_PATH"

          # Copy all build artifacts
          if [ -d "$OUTPUT_PATH" ]; then
            cp "$OUTPUT_PATH"/*.deb "$ARTIFACT_PATH/" 2>/dev/null || true
            cp "$OUTPUT_PATH"/*.changes "$ARTIFACT_PATH/" 2>/dev/null || true
            cp "$OUTPUT_PATH"/*.dsc "$ARTIFACT_PATH/" 2>/dev/null || true
            cp "$OUTPUT_PATH"/*.tar.xz "$ARTIFACT_PATH/" 2>/dev/null || true
          fi

          # List artifacts
          echo "[INFO] Artifacts to be uploaded:"
          ls -lah "$ARTIFACT_PATH/" || echo "No artifacts found"

      - name: Upload artifacts to Gitea
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: deb-packages-${{ steps.version.outputs.version }}
          path: artifacts-${{ steps.version.outputs.version }}/
          retention-days: 7
          if-no-files-found: warn
