name: Build Solus Package

on:
  # Trigger on manual dispatch
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (leave empty to auto-detect from source)"
        required: false
        default: ""
      sha256sum:
        description: "SHA256 hash of the tarball (leave empty to auto-calculate)"
        required: false
        default: ""

  # Trigger on push to main branch
  push:
    branches:
      - master
    paths:
      - "p3/app/updater/__init__.py"

  # Trigger on release creation
  release:
    types:
      - published
      - created

jobs:
  build-solus:
    runs-on: ubuntu-latest
    container:
      image: docker.io/solkeh/solus:solbuild

    steps:
      - name: Install build dependencies
        run: |
          eopkg up -y
          eopkg it -c system.devel -y
          eopkg it git -y

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version and SHA256
        id: version
        run: |
          VERSION=""
          SHA256=""

          # Determine version based on trigger type
          if [ -n "${{ github.event.inputs.version }}" ]; then
            # Manual dispatch with explicit version
            VERSION="${{ github.event.inputs.version }}"
            echo "[INFO] Using manual version: $VERSION"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual dispatch without version - fetch latest release
            echo "[INFO] Fetching latest release..."
            LATEST_RELEASE=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | grep '"tag_name"' | head -1 | sed 's/.*"tag_name": "\(.*\)".*/\1/')
            
            if [ -z "$LATEST_RELEASE" ]; then
              echo "[WARNING] No releases found, falling back to source detection"
              VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' p3/app/updater/__init__.py)
              if [ -z "$VERSION" ]; then
                echo "[ERROR] Could not extract version from p3/app/updater/__init__.py"
                exit 1
              fi
            else
              VERSION="${LATEST_RELEASE#v}"  # Remove 'v' prefix if present
              echo "[INFO] Using latest release version: $VERSION"
            fi
          elif [ "${{ github.event_name }}" == "release" ]; then
            # Release event - extract version from tag
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"  # Remove 'v' prefix if present
            echo "[INFO] Using version from release tag: $VERSION"
          else
            # Extract from p3/app/updater/__init__.py
            VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' p3/app/updater/__init__.py)
            if [ -z "$VERSION" ]; then
              echo "[ERROR] Could not extract version from p3/app/updater/__init__.py"
              exit 1
            fi
            echo "[INFO] Using version from source: $VERSION"
          fi

          # Determine SHA256
          if [ -n "${{ github.event.inputs.sha256sum }}" ]; then
            # Manual dispatch with explicit SHA256
            SHA256="${{ github.event.inputs.sha256sum }}"
            echo "[INFO] Using manual SHA256: $SHA256"
          elif [ "${{ github.event_name }}" == "release" ]; then
            # Download release tarball and calculate SHA256
            RELEASE_URL="${{ github.event.release.assets[0].browser_download_url }}"
            if [ -z "$RELEASE_URL" ]; then
              # Fallback: construct URL from repository and tag
              RELEASE_URL="https://github.com/${{ github.repository }}/archive/refs/tags/v${VERSION}.tar.gz"
            fi
            
            echo "[INFO] Downloading release artifacts from: $RELEASE_URL"
            if curl -L -o /tmp/linuxtoys-release.tar.gz "$RELEASE_URL"; then
              SHA256=$(sha256sum /tmp/linuxtoys-release.tar.gz | cut -d' ' -f1)
              echo "[INFO] Calculated SHA256: $SHA256"
            else
              echo "[ERROR] Failed to download release tarball"
              exit 1
            fi
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual dispatch - download release tarball or generate one
            RELEASE_URL="https://github.com/${{ github.repository }}/archive/refs/tags/v${VERSION}.tar.gz"
            
            echo "[INFO] Downloading release tarball from: $RELEASE_URL"
            if curl -L -o /tmp/linuxtoys-release.tar.gz "$RELEASE_URL" 2>/dev/null; then
              SHA256=$(sha256sum /tmp/linuxtoys-release.tar.gz | cut -d' ' -f1)
              echo "[INFO] Calculated SHA256 from release: $SHA256"
            else
              # Fallback: create a tarball from local repository
              echo "[INFO] Release tarball not found, creating from local repository"
              tar czf /tmp/linuxtoys-$VERSION.tar.gz --exclude=.git --exclude=.gitea --exclude=dev/build_output .
              SHA256=$(sha256sum /tmp/linuxtoys-$VERSION.tar.gz | cut -d' ' -f1)
              echo "[INFO] Calculated SHA256 from local: $SHA256"
            fi
          else
            # No SHA256 provided - create a tarball from local repository
            echo "[INFO] Creating tarball from local repository"
            tar czf /tmp/linuxtoys-$VERSION.tar.gz --exclude=.git --exclude=.gitea --exclude=dev/build_output .
            SHA256=$(sha256sum /tmp/linuxtoys-$VERSION.tar.gz | cut -d' ' -f1)
            echo "[INFO] Calculated SHA256: $SHA256"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION with SHA256: $SHA256"

      - name: Prepare build directory
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.version.outputs.sha256 }}"
          BUILD_DIR="/root/linuxtoys-$VERSION"

          # Create the build root directory
          mkdir -p "$BUILD_DIR"

          # Copy package.yml to the build directory and update it
          cp dev/build/solus/package.yml "$BUILD_DIR/"

          # Update version in package.yml
          sed -i "s/^version    : .*/version    : $VERSION/" "$BUILD_DIR/package.yml"

          # Update SHA256 in package.yml
          sed -i "s/: [a-f0-9]\{64\}$/: $SHA256/" "$BUILD_DIR/package.yml"

          # Update version in source URL
          sed -i "s|/v[0-9.]\+\.tar\.gz|/v$VERSION.tar.gz|g" "$BUILD_DIR/package.yml"

          # Update repository URL in homepage and source (if using GitHub)
          REPO_URL="https://github.com/${{ github.repository }}"
          sed -i "s|homepage   : .*|homepage   : $REPO_URL|" "$BUILD_DIR/package.yml"
          sed -i "s|https://github.com/[^/]*/[^ ]*|$REPO_URL|g" "$BUILD_DIR/package.yml"

          echo "[INFO] Updated package.yml with version=$VERSION and SHA256=$SHA256"

          # Create files directory for install sources
          mkdir -p "$BUILD_DIR/files"

          # Copy Python app, desktop file, and icon
          cp -r p3/* "$BUILD_DIR/files/"
          cp src/LinuxToys.desktop "$BUILD_DIR/files/"
          cp src/linuxtoys.svg "$BUILD_DIR/files/"

          # Create the main executable wrapper script
          cat >"$BUILD_DIR/files/linuxtoys" <<'WRAPPER'
#!/bin/bash
export LINUXTOYS_PROCESS_NAME="linuxtoys"
if [ $# -gt 0 ]; then
    export EASY_CLI=1
fi
cd /usr/share/linuxtoys
exec /usr/bin/python3 run.py "$@"
WRAPPER
          chmod +x "$BUILD_DIR/files/linuxtoys"

          # Clean up Python cache
          find "$BUILD_DIR/files" -name "__pycache__" -type d -delete
          find "$BUILD_DIR/files" -name "*.pyc" -delete

          echo "[INFO] Build directory prepared at: $BUILD_DIR"

      - name: Initialize solbuild
        run: |
          # Initialize solbuild (required once, creates base images)
          solbuild init -u -p main-x86_64 2>&1 | tail -20 || true

      - name: Build Solus package with solbuild
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_DIR="/root/linuxtoys-$VERSION"

          # Navigate to build directory and build
          cd "$BUILD_DIR"
          
          # Build the package (solbuild will handle the install process)
          echo "[INFO] Starting solbuild build process..."
          solbuild build -p main-x86_64 2>&1 | tee /tmp/solbuild.log || true

          echo "[INFO] Build completed, checking for artifacts..."

      - name: Verify build artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_DIR="/root/linuxtoys-$VERSION"

          echo "=== Build log (last 50 lines) ==="
          tail -50 /tmp/solbuild.log 2>/dev/null || echo "No build log found"

          echo ""
          echo "=== Looking for .eopkg artifacts ==="
          
          # Common solbuild output locations
          if [ -d "/var/lib/solbuild" ]; then
            find /var/lib/solbuild -name "*.eopkg" -type f 2>/dev/null | while read f; do
              echo "Found: $f ($(du -h "$f" | cut -f1))"
            done
          fi

          if [ -d "/root/.cache/solbuild" ]; then
            find /root/.cache/solbuild -name "*.eopkg" -type f 2>/dev/null | while read f; do
              echo "Found: $f ($(du -h "$f" | cut -f1))"
            done
          fi

          # List what's in the build directory
          echo ""
          echo "=== Build directory contents ==="
          ls -lah "$BUILD_DIR/"

      - name: Collect artifacts
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT_PATH="artifacts-$VERSION"
          BUILD_DIR="/root/linuxtoys-$VERSION"

          # Create artifact directory
          mkdir -p "$ARTIFACT_PATH"

          # Search for .eopkg files in various locations
          echo "[INFO] Searching for .eopkg artifacts..."
          
          # Check solbuild cache/output (typically in /var/lib/solbuild or .cache)
          if [ -d "/var/lib/solbuild" ]; then
            find /var/lib/solbuild -name "*.eopkg" -exec cp {} "$ARTIFACT_PATH/" \; 2>/dev/null
          fi

          if [ -d "/root/.cache/solbuild" ]; then
            find /root/.cache/solbuild -name "*.eopkg" -exec cp {} "$ARTIFACT_PATH/" \; 2>/dev/null
          fi

          # Check the build directory itself
          find "$BUILD_DIR" -name "*.eopkg" -exec cp {} "$ARTIFACT_PATH/" \; 2>/dev/null

          # List what we collected
          echo "[INFO] Artifacts collected:"
          ls -lah "$ARTIFACT_PATH/" || echo "No artifacts found"

          # If no .eopkg found but build seemed to succeed, create a build log artifact
          if [ ! "$(ls -A "$ARTIFACT_PATH")" ]; then
            echo "[WARNING] No .eopkg packages found. Creating build log artifact."
            cp /tmp/solbuild.log "$ARTIFACT_PATH/build.log" 2>/dev/null || echo "Build log not available"
          fi

      - name: Upload artifacts to Gitea
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: solus-package-${{ steps.version.outputs.version }}
          path: artifacts-${{ steps.version.outputs.version }}/
          retention-days: 7
          if-no-files-found: warn
